<style>
/* self-hosted headline webfonts: Noto Serif TC/SC subset to glyphs used on this site */
@font-face{font-family:"Noto Serif TC Headline";src:url("fonts/noto-serif-tc-headline.woff2") format("woff2");font-weight:200 900;font-style:normal;font-display:swap}
@font-face{font-family:"Noto Serif SC Headline";src:url("fonts/noto-serif-sc-headline.woff2") format("woff2");font-weight:200 900;font-style:normal;font-display:swap}
:root{
  --paper:#ffffff; --ink:#1c1e26; --navy:#14213d; --muted:#69707f; --line:#e7e4dd; --wash:#f7f6f1;
  --serif:"Noto Serif TC Headline",Georgia,"Times New Roman","Noto Serif TC",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","PingFang TC","Microsoft JhengHei","Microsoft YaHei",sans-serif;
}
html[lang="zh-Hans"]{--serif:"Noto Serif SC Headline",Georgia,"Times New Roman","Noto Serif SC","SimSun",serif}
/* 2026-07-15用戶指示：唔用深色模式，全程淺色 */
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.7;-webkit-font-smoothing:antialiased}
::selection{background:var(--navy);color:var(--paper)}
:focus-visible{outline:2px solid var(--navy);outline-offset:2px;border-radius:2px}
.wrap{max-width:760px;margin:0 auto;padding:0 24px}
header{border-bottom:6px double var(--navy);padding:68px 0 34px}
.kicker{font-size:12.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
h1{font-family:var(--serif);color:var(--navy);font-size:clamp(30px,5vw,48px);line-height:1.25;letter-spacing:.015em;margin-bottom:0;text-wrap:balance}
.mast-rule{width:230px;height:9px;position:relative;margin:20px 0 14px}
.mast-rule::before{content:"";position:absolute;left:0;right:0;top:4px;height:1px;background:var(--navy);opacity:.45}
.mast-rule::after{content:"";position:absolute;left:50%;top:1px;width:7px;height:7px;background:var(--navy);transform:translateX(-50%) rotate(45deg)}
.sub{color:var(--muted);font-size:15px}
.pillset{display:inline-flex;gap:4px;background:var(--wash);border:1px solid var(--line);border-radius:99px;padding:3px;margin-top:22px}
.pillset button{border:0;background:transparent;color:var(--muted);font-size:13px;font-family:var(--sans);padding:5px 14px;border-radius:99px;cursor:pointer;transition:color .15s,background-color .15s}
.pillset button:hover{color:var(--navy)}
.pillset button[aria-pressed="true"]{background:var(--navy);color:var(--paper);font-weight:600}
main{padding:44px 0 80px}
h2{font-family:var(--serif);color:var(--navy);font-size:20px;margin-bottom:18px}
a.issue{display:block;border:1px solid var(--line);border-radius:6px;padding:24px 26px;text-decoration:none;color:inherit;margin-bottom:14px;transition:border-color .15s,box-shadow .2s}
a.issue:hover{border-color:var(--navy);box-shadow:0 3px 14px rgba(20,33,61,.08)}
a.issue .vol{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
a.issue .t{font-family:var(--serif);color:var(--navy);font-size:22px;font-weight:700;margin:4px 0}
a.issue .d{font-size:13.5px;color:var(--muted)}
.soon{border:1px dashed var(--line);border-radius:6px;padding:22px 26px;color:var(--muted);font-size:14px;margin-bottom:14px}
footer{border-top:1px solid var(--line);padding:24px 0 60px;color:var(--muted);font-size:12px}
footer a{color:var(--muted)}
@media print{
  .pillset{display:none}
  a{text-decoration:none;color:inherit}
}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="kicker">Travel Retail Market Intelligence</div>
    <h1 data-i18n="h1">旅遊零售市場情報月報</h1>
    <div class="mast-rule" aria-hidden="true"></div>
    <p class="sub" data-i18n="sub">每月一期：宏觀客流、零售免稅、遊客畫像、品牌動態與前瞻行動建議（Beauty／Hotel／Wine &amp; Spirit）。</p>
    <div class="pillset" id="langset" role="group" aria-label="language">
      <button data-lang="tc" aria-pressed="true">繁中</button>
      <button data-lang="en" aria-pressed="false">EN</button>
      <button data-lang="sc" aria-pressed="false">简中</button>
    </div>
  </div>
</header>
<main>
  <div class="wrap">
    <h2 data-i18n="arch">期刊目錄</h2>
    <a class="issue" id="issue-2026-06" href="2026-06/">
      <span class="vol">Vol.1 · Latest</span>
      <div class="t" data-i18n="i1t">2026年6月號</div>
      <div class="d" data-i18n="i1d">數據期間：2026年6月1–30日｜焦點專題：海南暑期爭奪戰</div>
    </a>
    <div class="soon" data-i18n="soon">Vol.2｜2026年7月號——8月發佈，敬請期待。</div>
  </div>
</main>
<footer>
  <div class="wrap">© 2026 iClick Interactive · Carrie Hui · <a href="mailto:carrie.hui@i-click.com">carrie.hui@i-click.com</a> · +852 6582 2299</div>
</footer>
<script>
(function(){
"use strict";
var TITLES={tc:"Travel Retail Market Intelligence｜期刊目錄",en:"Travel Retail Market Intelligence | Issue Archive",sc:"Travel Retail Market Intelligence｜期刊目录"};
var I18N={tc:{},en:{
  "h1":"Monthly Market Intelligence for Travel Retail",
  "sub":"One issue per month: macro flows, retail & duty-free, traveller profiles, brand radar and forward actions (Beauty / Hotel / Wine & Spirit).",
  "arch":"Issue Archive",
  "i1t":"June 2026 Issue",
  "i1d":"Data period: 1–30 June 2026 | In focus: The Battle for Hainan's Summer",
  "soon":"Vol.2 | July 2026 issue — publishing in August."
},sc:{
  "h1":"旅游零售市场情报月报",
  "sub":"每月一期：宏观客流、零售免税、游客画像、品牌动态与前瞻行动建议（Beauty／Hotel／Wine & Spirit）。",
  "arch":"期刊目录",
  "i1t":"2026年6月号",
  "i1d":"数据期间：2026年6月1–30日｜焦点专题：海南暑期争夺战",
  "soon":"Vol.2｜2026年7月号——8月发布，敬请期待。"
}};
document.querySelectorAll("[data-i18n]").forEach(function(el){
  var k=el.getAttribute("data-i18n");
  if(!(k in I18N.tc)) I18N.tc[k]=el.textContent;
});
var state={lang:"tc"};
function apply(){
  var d=I18N[state.lang], f=I18N.tc;
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    var k=el.getAttribute("data-i18n");
    var v=(k in d)?d[k]:f[k];
    if(v!==undefined) el.textContent=v;
  });
  document.documentElement.lang={tc:"zh-Hant",en:"en",sc:"zh-Hans"}[state.lang];
  document.title=TITLES[state.lang];
  document.querySelectorAll("#langset button").forEach(function(b){
    b.setAttribute("aria-pressed", b.getAttribute("data-lang")===state.lang?"true":"false");
  });
  // carry language (and preserved industry) into issue links
  var ind="";
  try{ind=new URLSearchParams(window.location.search).get("industry")||"";}catch(e){}
  document.querySelectorAll("a.issue").forEach(function(a){
    var base=a.getAttribute("href").split("?")[0];
    a.setAttribute("href", base+"?lang="+state.lang+(ind?"&industry="+ind:""));
  });
  try{
    var u=new URL(window.location.href);
    u.searchParams.set("lang",state.lang);
    history.replaceState(null,"",u.toString());
  }catch(e){}
}
document.getElementById("langset").addEventListener("click",function(e){
  var b=e.target.closest("button"); if(!b) return;
  state.lang=b.getAttribute("data-lang"); apply();
});
(function(){
  try{
    var l=new URLSearchParams(window.location.search).get("lang");
    if(l&&I18N[l]) state.lang=l;
  }catch(e){}
})();
apply();
})();
</script>
</body>
</html>
